<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tools</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1e1e1e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f0f0f0;
            letter-spacing: 0.05rem;
            text-align: center;
            margin-bottom: 2rem;
        }

        .tools {
            display: grid;
            gap: 1rem;
        }

        a {
            display: block;
            padding: 1.2rem;
            background: #111;
            border: 1px solid #333;
            border-radius: 6px;
            color: #aaa;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 0.05rem;
        }

        a:hover {
            border-color: #666;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Developer Tools</h1>
        <div class="tools">
            <a href="/2fa">🔐 Temporary 2FA / TOTP</a>
            <a href="/tv.html">📺 TV Streamer</a>
            <a href="/htmlbeauty">🧹 HTML Beautifier</a>
            <!-- Tambah tool lain di sini -->
        </div>
    </div>
</body>

</html>
