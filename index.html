<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tools</title>
    <style>
        body {
            font-family: system-ui;
            background: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            margin-bottom: 2rem;
        }

        .tools {
            display: grid;
            gap: 1rem;
        }

        a {
            display: block;
            padding: 1.5rem;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: #4f8;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        a:hover {
            background: #2a2a2a;
            border-color: #4f8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🛠️ Developer Tools</h1>
        <div class="tools">
            <a href="/2fa">🔐 Temporary 2FA / TOTP</a>
            <a href="/htmlbeauty">🧹 HTML Beautifier</a>
            <!-- Tambah tool lain di sini -->
        </div>
    </div>
</body>

</html>
